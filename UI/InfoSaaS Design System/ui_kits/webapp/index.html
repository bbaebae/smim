          <div className="ambient-shadow" style={{ background:'#fff', borderRadius:16, border:'1px solid rgba(228,226,226,0.5)', padding:32, marginBottom:24 }}>
            {/* Tags */}
            <div style={{ display:'flex', gap:6, marginBottom:20, flexWrap:'wrap' }}>
              {item.contents.category && (
                <span style={{ background:'rgba(19,98,153,0.1)', color:'#136299', fontSize:11, fontWeight:600, letterSpacing:'0.05em', textTransform:'uppercase', padding:'3px 10px', borderRadius:9999 }}>{item.contents.category}</span>
              )}
              {(item.contents.tags || []).slice(0,2).map(tag => (
                <span key={tag} style={{ background:'#efeded', color:'#454651', fontSize:11, fontWeight:500, padding:'3px 10px', borderRadius:9999, border:'1px solid #e4e2e2' }}>{tag}</span>
              ))}
            </div>
            {/* Title */}
            <h2 style={{ fontSize:22, fontWeight:600, color:'#1b1c1c', lineHeight:1.35, marginBottom:20, letterSpacing:'-0.01em' }}>{item.contents.title}</h2>
            {/* Divider */}
            <div style={{ height:1, background:'#e4e2e2', marginBottom:20 }} />
            {/* Summary */}
            <p style={{ fontSize:16, lineHeight:1.65, color:'#454651' }}>{item.contents.summary}</p>
          </div>

          {/* Rating buttons */}
          <div style={{ display:'flex', gap:10, justifyContent:'center' }}>
            <button onClick={() => rate(0)} style={{ flex:1, maxWidth:160, display:'flex', flexDirection:'column', alignItems:'center', gap:2, padding:'12px 16px', borderRadius:12, border:'none', background:'#ffdbc8', color:'#321300', cursor:'pointer', transition:'background 150ms' }}
              onMouseEnter={e => e.currentTarget.style.background='#ffb68a'}
              onMouseLeave={e => e.currentTarget.style.background='#ffdbc8'}>
              <span style={{ fontSize:11, fontWeight:600, opacity:0.65, letterSpacing:'0.04em' }}>{'< 1m'}</span>
              <span style={{ fontSize:15, fontWeight:600 }}>잊었음</span>
            </button>
            <button onClick={() => rate(3)} style={{ flex:1, maxWidth:160, display:'flex', flexDirection:'column', alignItems:'center', gap:2, padding:'12px 16px', borderRadius:12, border:'none', background:'#cfe5ff', color:'#001d33', cursor:'pointer', transition:'background 150ms' }}
              onMouseEnter={e => e.currentTarget.style.background='#98cbff'}
              onMouseLeave={e => e.currentTarget.style.background='#cfe5ff'}>
              <span style={{ fontSize:11, fontWeight:600, opacity:0.65, letterSpacing:'0.04em' }}>10m</span>
              <span style={{ fontSize:15, fontWeight:600 }}>희미함</span>
            </button>
            <button onClick={() => rate(5)} style={{ flex:1, maxWidth:160, display:'flex', flexDirection:'column', alignItems:'center', gap:2, padding:'12px 16px', borderRadius:12, border:'none', background:'#132175', color:'#fff', cursor:'pointer', transition:'background 150ms', boxShadow:'0 2px 8px rgba(19,33,117,0.2)' }}
              onMouseEnter={e => e.currentTarget.style.background='#2d3a8c'}
              onMouseLeave={e => e.currentTarget.style.background='#132175'}>
              <span style={{ fontSize:11, fontWeight:600, opacity:0.7, letterSpacing:'0.04em' }}>4d</span>
              <span style={{ fontSize:15, fontWeight:600 }}>기억남</span>
            </button>
          </div>
          <p style={{ textAlign:'center', marginTop:12, fontSize:13, color:'#767683' }}>Space 키로 기억남 선택</p>
        </div>
      </div>
    </div>
  );
};

// ─── Add Content Modal ────────────────────────────────────────
const TABS = [
  { id:'article', icon:'link', label:'Article URL', placeholder:'https://example.com/article', hint:'스밈이 본문, 저자, 날짜를 자동으로 추출합니다.' },
  { id:'youtube', icon:'smart_display', label:'YouTube URL', placeholder:'https://youtube.com/watch?v=...', hint:'자막을 기반으로 핵심 내용을 요약합니다.' },
  { id:'text',    icon:'notes', label:'Direct Text' },
  { id:'file',    icon:'upload_file', label:'File Upload', hint:'PDF, TXT, MD 파일을 지원합니다.' },
];

const AddContentModal = ({ onClose }) => {
  const [tab, setTab] = React.useState('article');
  const [url, setUrl] = React.useState('');
  const [title, setTitle] = React.useState('');
  const [text, setText] = React.useState('');
  const [file, setFile] = React.useState(null);
  const [loading, setLoading] = React.useState(false);
  const activeTab = TABS.find(t => t.id === tab);

  const handleSave = (e) => {
    e.preventDefault();
    setLoading(true);
    setTimeout(() => { setLoading(false); onClose(); }, 1400);
  };

  const inputStyle = { width:'100%', padding:'9px 12px', border:'1px solid #c6c5d3', borderRadius:8, fontSize:14, color:'#1b1c1c', outline:'none', transition:'border-color 150ms, box-shadow 150ms', background:'#fff', boxSizing:'border-box' };

  return (
    <div style={{ position:'fixed', inset:0, zIndex:50, background:'rgba(0,0,0,0.4)', display:'flex', alignItems:'flex-end', justifyContent:'center' }}
      onClick={onClose}>
      <div style={{ width:'100%', maxWidth:520, background:'#fff', borderRadius:'16px 16px 0 0', boxShadow:'0 -8px 32px rgba(19,33,117,0.12)', overflow:'hidden' }}
        onClick={e => e.stopPropagation()}>
        {/* Header */}
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'16px 20px', borderBottom:'1px solid #e4e2e2' }}>
          <span style={{ fontSize:16, fontWeight:700, color:'#1b1c1c' }}>Add to Knowledge Base</span>
          <button onClick={onClose} style={{ background:'none', border:'none', cursor:'pointer', color:'#767683', padding:4 }}>
            <span style={{ fontFamily:"'Material Symbols Outlined'", fontFeatureSettings:"'liga' 1", WebkitFontFeatureSettings:"'liga' 1", fontStyle:'normal', fontWeight:'normal', fontVariationSettings:"'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24", userSelect:'none', lineHeight:1, fontSize:20 }}>close</span>
          </button>
        </div>
        {/* Tabs */}
        <div style={{ background:'#fbf9f8', borderBottom:'1px solid #e4e2e2', display:'flex', overflowX:'auto', scrollbarWidth:'none' }}>
          {TABS.map(t => (
            <button key={t.id} onClick={() => setTab(t.id)} style={{
              display:'flex', alignItems:'center', gap:6, padding:'11px 16px',
              fontSize:13, fontWeight:500, whiteSpace:'nowrap',
              border:'none', borderBottom: tab===t.id ? '2px solid #132175' : '2px solid transparent',
              background: tab===t.id ? '#fff' : 'transparent',
              color: tab===t.id ? '#132175' : '#454651', cursor:'pointer',
              transition:'all 120ms',
            }}>
              <span style={{ fontFamily:"'Material Symbols Outlined'", fontFeatureSettings:"'liga' 1", WebkitFontFeatureSettings:"'liga' 1", fontStyle:'normal', fontWeight:'normal', fontVariationSettings:"'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24", userSelect:'none', lineHeight:1, fontSize:16 }}>{t.icon}</span>
              {t.label}
            </button>
          ))}
        </div>
        {/* Body */}
        <form onSubmit={handleSave}>
          <div style={{ padding:20, background:'#fff', display:'flex', flexDirection:'column', gap:14 }}>
            {(tab === 'article' || tab === 'youtube') && (
              <>
                <div>
                  <label style={{ display:'block', fontSize:13, color:'#454651', marginBottom:6 }}>URL을 붙여넣어 콘텐츠를 추출하세요</label>
                  <div style={{ position:'relative' }}>
                    <span style={{ fontFamily:"'Material Symbols Outlined'", fontFeatureSettings:"'liga' 1", WebkitFontFeatureSettings:"'liga' 1", fontStyle:'normal', fontWeight:'normal', fontVariationSettings:"'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24", userSelect:'none', lineHeight:1, position:'absolute', left:10, top:'50%', transform:'translateY(-50%)', fontSize:18, color:'#767683' }}>language</span>
                    <input type="url" placeholder={activeTab.placeholder} value={url} onChange={e => setUrl(e.target.value)}
                      style={{ ...inputStyle, paddingLeft:34 }}
                      onFocus={e => { e.target.style.borderColor='#136299'; e.target.style.boxShadow='0 0 0 2px rgba(19,98,153,0.1)'; }}
                      onBlur={e => { e.target.style.borderColor='#c6c5d3'; e.target.style.boxShadow='none'; }}
                    />
                  </div>
                </div>
                {activeTab.hint && (
                  <div style={{ display:'flex', gap:8, padding:'10px 12px', background:'#f5f3f3', borderRadius:8, border:'1px solid #e4e2e2' }}>
                    <span style={{ fontFamily:"'Material Symbols Outlined'", fontFeatureSettings:"'liga' 1", WebkitFontFeatureSettings:"'liga' 1", fontStyle:'normal', fontWeight:'normal', fontVariationSettings:"'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24", userSelect:'none', lineHeight:1, fontSize:16, color:'#136299', flexShrink:0, marginTop:1 }}>info</span>
                    <p style={{ fontSize:13, color:'#454651', lineHeight:1.5 }}>{activeTab.hint}</p>
                  </div>
                )}
              </>
            )}
            {tab === 'text' && (
              <>
                <div>
                  <label style={{ display:'block', fontSize:13, color:'#454651', marginBottom:6 }}>제목</label>
                  <input type="text" placeholder="콘텐츠 제목" value={title} onChange={e => setTitle(e.target.value)}
                    style={inputStyle}
                    onFocus={e => { e.target.style.borderColor='#136299'; e.target.style.boxShadow='0 0 0 2px rgba(19,98,153,0.1)'; }}
                    onBlur={e => { e.target.style.borderColor='#c6c5d3'; e.target.style.boxShadow='none'; }}
                  />
                </div>
                <div>
                  <label style={{ display:'block', fontSize:13, color:'#454651', marginBottom:6 }}>내용</label>
                  <textarea placeholder="내용을 입력하세요" value={text} onChange={e => setText(e.target.value)} rows={5}
                    style={{ ...inputStyle, resize:'none' }}
                    onFocus={e => { e.target.style.borderColor='#136299'; e.target.style.boxShadow='0 0 0 2px rgba(19,98,153,0.1)'; }}
                    onBlur={e => { e.target.style.borderColor='#c6c5d3'; e.target.style.boxShadow='none'; }}
                  />
                </div>
              </>
            )}
            {tab === 'file' && (
              <label style={{ display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', borderRadius:12, border:'2px dashed #c6c5d3', padding:'36px 20px', cursor:'pointer', transition:'all 150ms', background:'#fbf9f8' }}
                onMouseEnter={e => { e.currentTarget.style.borderColor='#136299'; e.currentTarget.style.background='#f5f3f3'; }}
                onMouseLeave={e => { e.currentTarget.style.borderColor='#c6c5d3'; e.currentTarget.style.background='#fbf9f8'; }}>
                <span style={{ fontFamily:"'Material Symbols Outlined'", fontFeatureSettings:"'liga' 1", WebkitFontFeatureSettings:"'liga' 1", fontStyle:'normal', fontWeight:'normal', fontVariationSettings:"'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24", userSelect:'none', lineHeight:1, fontSize:36, color:'#767683', marginBottom:6 }}>upload_file</span>
                <span style={{ fontSize:14, fontWeight:600, color:'#1b1c1c' }}>{file ? file.name : '파일 선택 또는 드래그'}</span>
                <span style={{ fontSize:12, color:'#767683', marginTop:4 }}>{activeTab.hint}</span>
                <input type="file" accept=".pdf,.txt,.md" style={{ display:'none' }} onChange={e => setFile(e.target.files?.[0] || null)} />
              </label>
            )}
          </div>
          {/* Footer */}
          <div style={{ display:'flex', alignItems:'center', justifyContent:'flex-end', gap:10, padding:'14px 20px', borderTop:'1px solid #e4e2e2', background:'#fbf9f8' }}>
            <button type="button" onClick={onClose} style={{ padding:'8px 18px', borderRadius:8, fontSize:14, fontWeight:500, color:'#454651', border:'1px solid #c6c5d3', background:'transparent', cursor:'pointer' }}>CANCEL</button>
            <button type="submit" disabled={loading} style={{ padding:'8px 20px', borderRadius:8, fontSize:14, fontWeight:600, background: loading ? '#4b57aa' : '#132175', color:'#fff', border:'none', cursor:'pointer', transition:'background 150ms', minWidth:80 }}>
              {loading ? (
                <span style={{ display:'flex', alignItems:'center', gap:6 }}>
                  <svg width="14" height="14" viewBox="0 0 14 14" style={{ animation:'spin 0.8s linear infinite' }}><circle cx="7" cy="7" r="5" fill="none" stroke="rgba(255,255,255,0.4)" strokeWidth="2"/><path d="M7 2 A5 5 0 0 1 12 7" fill="none" stroke="#fff" strokeWidth="2" strokeLinecap="round"/></svg>
                  분석 중...
                </span>
              ) : 'SAVE'}
            </button>
          </div>
        </form>
      </div>
      <style>{`@keyframes spin { to { transform: rotate(360deg); } }`}</style>
    </div>
  );
};

// ─── Content Detail ───────────────────────────────────────────
const ContentDetail = ({ item, onBack }) => (
  <div style={{ flex:1, display:'flex', flexDirection:'column', minWidth:0 }}>
    <header style={{ background:'rgba(255,255,255,0.85)', backdropFilter:'blur(12px)', borderBottom:'1px solid #e4e2e2', padding:'0 24px', height:56, display:'flex', alignItems:'center', gap:12, flexShrink:0 }}>
      <button onClick={onBack} style={{ background:'none', border:'none', cursor:'pointer', color:'#767683', display:'flex', padding:4 }}>
        <span style={{ fontFamily:"'Material Symbols Outlined'", fontFeatureSettings:"'liga' 1", WebkitFontFeatureSettings:"'liga' 1", fontStyle:'normal', fontWeight:'normal', fontVariationSettings:"'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24", userSelect:'none', lineHeight:1, fontSize:22 }}>arrow_back</span>
      </button>
      <span style={{ fontSize:14, fontWeight:600, color:'#1b1c1c', flex:1, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{item.title}</span>
      <button style={{ background:'none', border:'none', cursor:'pointer', color:'#767683', display:'flex', padding:4 }}>
        <span style={{ fontFamily:"'Material Symbols Outlined'", fontFeatureSettings:"'liga' 1", WebkitFontFeatureSettings:"'liga' 1", fontStyle:'normal', fontWeight:'normal', fontVariationSettings:"'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24", userSelect:'none', lineHeight:1, fontSize:22 }}>more_vert</span>
      </button>
    </header>
    <div style={{ flex:1, overflowY:'auto', padding:'28px 24px' }}>
      <div style={{ maxWidth:720, margin:'0 auto' }}>
        <div style={{ display:'flex', gap:6, marginBottom:16, flexWrap:'wrap' }}>
          <span style={{ background:'rgba(19,98,153,0.1)', color:'#136299', fontSize:11, fontWeight:600, letterSpacing:'0.05em', textTransform:'uppercase', padding:'3px 10px', borderRadius:9999 }}>{item.category}</span>
          {(item.tags||[]).map(tag => <span key={tag} style={{ background:'#efeded', color:'#454651', fontSize:11, fontWeight:500, padding:'3px 10px', borderRadius:9999, border:'1px solid #e4e2e2' }}>{tag}</span>)}
        </div>
        <h1 style={{ fontSize:26, fontWeight:700, color:'#1b1c1c', lineHeight:1.3, letterSpacing:'-0.02em', marginBottom:20 }}>{item.title}</h1>
        <div style={{ height:1, background:'#e4e2e2', marginBottom:20 }} />
        <div style={{ fontSize:16, fontWeight:600, color:'#1b1c1c', marginBottom:10 }}>AI 요약</div>
        <p style={{ fontSize:16, lineHeight:1.7, color:'#454651', marginBottom:28 }}>{item.summary}</p>
        <div style={{ background:'#f5f3f3', borderRadius:10, padding:'16px 18px', border:'1px solid #e4e2e2' }}>
          <div style={{ fontSize:12, fontWeight:600, letterSpacing:'0.04em', color:'#767683', textTransform:'uppercase', marginBottom:8 }}>원문 정보</div>
          <div style={{ fontSize:13, color:'#454651' }}>유형: {TYPE_LABEL[item.type]} · 저장일: {item.created_at}</div>
        </div>
        <div style={{ display:'flex', gap:10, marginTop:24 }}>
          <button style={{ flex:1, padding:'10px 0', borderRadius:8, background:'#132175', color:'#fff', border:'none', fontSize:14, fontWeight:600, cursor:'pointer' }}>원문 보기</button>
          <button style={{ padding:'10px 14px', borderRadius:8, background:'transparent', color:'#454651', border:'1px solid #e4e2e2', fontSize:14, cursor:'pointer' }}>
            <span style={{ fontFamily:"'Material Symbols Outlined'", fontFeatureSettings:"'liga' 1", WebkitFontFeatureSettings:"'liga' 1", fontStyle:'normal', fontWeight:'normal', fontVariationSettings:"'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24", userSelect:'none', lineHeight:1, fontSize:18 }}>share</span>
          </button>
        </div>
      </div>
    </div>
  </div>
);

// ─── Library Screen ───────────────────────────────────────────
const LibraryScreen = ({ onDetail }) => {
  const [search, setSearch] = React.useState('');
  const filtered = CONTENTS.filter(c => !search || c.title.includes(search) || c.summary.includes(search));
  return (
    <div style={{ flex:1, display:'flex', flexDirection:'column', minWidth:0 }}>
      <header style={{ background:'rgba(255,255,255,0.85)', backdropFilter:'blur(12px)', borderBottom:'1px solid #e4e2e2', padding:'0 24px', height:56, display:'flex', alignItems:'center', gap:12, flexShrink:0 }}>
        <div style={{ position:'relative', flex:1 }}>
          <span style={{ fontFamily:"'Material Symbols Outlined'", fontFeatureSettings:"'liga' 1", WebkitFontFeatureSettings:"'liga' 1", fontStyle:'normal', fontWeight:'normal', fontVariationSettings:"'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24", userSelect:'none', lineHeight:1, position:'absolute', left:10, top:'50%', transform:'translateY(-50%)', fontSize:18, color:'#767683' }}>search</span>
          <input placeholder="라이브러리 검색..." value={search} onChange={e => setSearch(e.target.value)}
            style={{ width:'100%', paddingLeft:34, paddingRight:12, paddingTop:7, paddingBottom:7, border:'1px solid #e4e2e2', borderRadius:8, fontSize:14, color:'#1b1c1c', outline:'none', background:'#f5f3f3' }} />
        </div>
      </header>
      <div style={{ flex:1, overflowY:'auto', padding:24 }}>
        <div style={{ maxWidth:840, margin:'0 auto' }}>
          <div style={{ fontSize:13, color:'#767683', marginBottom:14 }}>총 {filtered.length}개 항목</div>
          <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
            {filtered.map(item => (
              <div key={item.id} onClick={() => onDetail(item)} style={{ display:'flex', alignItems:'center', gap:12, padding:'10px 14px', background:'#fff', borderRadius:8, border:'1px solid #e4e2e2', cursor:'pointer' }}
                onMouseEnter={e => e.currentTarget.style.background='#f5f3f3'}
                onMouseLeave={e => e.currentTarget.style.background='#fff'}>
                <div style={{ width:32, height:32, borderRadius:6, background:'#efeded', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
                  <span style={{ fontFamily:"'Material Symbols Outlined'", fontFeatureSettings:"'liga' 1", WebkitFontFeatureSettings:"'liga' 1", fontStyle:'normal', fontWeight:'normal', fontVariationSettings:"'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24", userSelect:'none', lineHeight:1, fontSize:18, color:'#767683' }}>{TYPE_ICON[item.type]}</span>
                </div>
                <div style={{ flex:1, minWidth:0 }}>
                  <div style={{ fontSize:13, fontWeight:600, color:'#1b1c1c', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{item.title}</div>
                  <div style={{ fontSize:11, color:'#767683', marginTop:1 }}>{item.category} · {item.created_at}</div>
                </div>
                <span style={{ fontFamily:"'Material Symbols Outlined'", fontFeatureSettings:"'liga' 1", WebkitFontFeatureSettings:"'liga' 1", fontStyle:'normal', fontWeight:'normal', fontVariationSettings:"'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24", userSelect:'none', lineHeight:1, fontSize:18, color:'#c6c5d3', flexShrink:0 }}>chevron_right</span>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
};

// ─── App ──────────────────────────────────────────────────────
const App = () => {
  const [screen, setScreen] = React.useState('dashboard');
  const [showModal, setShowModal] = React.useState(false);
  const [detail, setDetail] = React.useState(null);

  const handleNav = (s) => { setDetail(null); setScreen(s); };

  const handleDetail = (item) => { setDetail(item); setScreen('detail'); };

  return (
    <div style={{ display:'flex', height:'100vh', overflow:'hidden' }}>
      <Sidebar screen={screen} setScreen={handleNav} />
      {screen === 'dashboard' && <DashboardScreen onReview={() => setScreen('review')} onAdd={() => setShowModal(true)} onDetail={handleDetail} />}
      {(screen === 'review' || screen === 'review-card') && <ReviewScreen onBack={() => setScreen('dashboard')} />}
      {screen === 'library' && <LibraryScreen onDetail={handleDetail} />}
      {screen === 'detail' && detail && <ContentDetail item={detail} onBack={() => setScreen('dashboard')} />}
      {showModal && <AddContentModal onClose={() => setShowModal(false)} />}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
