<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px 24px; background: #fff; font-family: var(--font-primary); }
  .row { display: flex; flex-direction: column; gap: 2px; }
  .type-row { display: flex; align-items: baseline; gap: 16px; padding: 6px 0; border-bottom: 1px solid #f0f4f8; }
  .type-meta { width: 140px; flex-shrink: 0; }
  .type-meta-name { font-size: 10px; font-weight: 500; color: #64748d; font-feature-settings: "ss01"; }
  .type-meta-spec { font-size: 9px; color: #b9b9f9; font-family: 'Source Code Pro', monospace; margin-top: 1px; }
  .type-sample { color: #061b31; font-feature-settings: "ss01"; }
</style>
</head>
<body>
<div class="row">
  <div class="type-row">
    <div class="type-meta">
      <div class="type-meta-name">Display Hero</div>
      <div class="type-meta-spec">56px · 300 · -1.4px</div>
    </div>
    <div class="type-sample" style="font-size:56px; font-weight:300; line-height:1.03; letter-spacing:-1.4px;">정보</div>
  </div>
  <div class="type-row">
    <div class="type-meta">
      <div class="type-meta-name">Display Large</div>
      <div class="type-meta-spec">48px · 300 · -0.96px</div>
    </div>
    <div class="type-sample" style="font-size:48px; font-weight:300; line-height:1.15; letter-spacing:-0.96px;">정보를 모으고</div>
  </div>
  <div class="type-row">
    <div class="type-meta">
      <div class="type-meta-name">Section Heading</div>
      <div class="type-meta-spec">32px · 300 · -0.64px</div>
    </div>
    <div class="type-sample" style="font-size:32px; font-weight:300; line-height:1.10; letter-spacing:-0.64px;">찾고, 다시 쓰세요</div>
  </div>
  <div class="type-row">
    <div class="type-meta">
      <div class="type-meta-name">Sub-heading Large</div>
      <div class="type-meta-spec">26px · 300 · -0.26px</div>
    </div>
    <div class="type-sample" style="font-size:26px; font-weight:300; line-height:1.12; letter-spacing:-0.26px;">정보 관리의 새로운 방법</div>
  </div>
  <div class="type-row">
    <div class="type-meta">
      <div class="type-meta-name">Sub-heading</div>
      <div class="type-meta-spec">22px · 300 · -0.22px</div>
    </div>
    <div class="type-sample" style="font-size:22px; font-weight:300; line-height:1.10; letter-spacing:-0.22px;">모든 정보를 한 곳에서</div>
  </div>
</div>
</body>
</html>
