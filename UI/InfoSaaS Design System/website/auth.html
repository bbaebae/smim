<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>스밈 — 로그인</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: #fbf9f8;
    color: #1b1c1c;
    -webkit-font-smoothing: antialiased;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px 16px;
  }
  button, input { font-family: inherit; }

  /* ── Card ───────────────────────────────────────────────── */
  .card {
    width: 100%;
    max-width: 360px;
  }

  /* ── Logo ───────────────────────────────────────────────── */
  .logo-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    margin-bottom: 32px;
  }
  .logo-icon {
    width: 48px; height: 48px;
    border-radius: 12px;
    background: #2d3a8c;
    display: flex; align-items: center; justify-content: center;
  }
  .logo-icon span {
    color: #fff; font-size: 20px; font-weight: 700;
  }
  .logo-name {
    font-size: 18px; font-weight: 700;
    color: #132175; letter-spacing: -0.3px;
  }
  .logo-sub {
    font-size: 13px; color: #767683; font-weight: 400;
    margin-top: -4px;
  }

  /* ── Page title ─────────────────────────────────────────── */
  .page-title {
    font-size: 22px; font-weight: 700;
    color: #132175; letter-spacing: -0.02em;
    text-align: center;
    margin-bottom: 24px;
  }

  /* ── Social buttons ─────────────────────────────────────── */
  .social-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
  .btn-social {
    width: 100%; display: flex; align-items: center; justify-content: center;
    gap: 10px; padding: 11px 16px; border-radius: 10px; border: none;
    font-size: 15px; font-weight: 600; cursor: pointer;
    transition: transform 120ms ease, opacity 120ms ease;
  }
  .btn-social:hover { transform: scale(1.015); }
  .btn-social:active { transform: scale(0.985); }
  .btn-google {
    background: #fff; color: #3c3c3c;
    border: 1px solid #dbd9d9;
  }
  .btn-google:hover { background: #f8f8f8; }
  .btn-kakao  { background: #FEE500; color: #191919; }
  .btn-kakao:hover { background: #f0d800; }
  .btn-naver  { background: #03C75A; color: #fff; }
  .btn-naver:hover { background: #02b350; }

  /* ── Divider ────────────────────────────────────────────── */
  .divider {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 20px;
  }
  .divider-line { flex: 1; height: 1px; background: #e4e2e2; }
  .divider-text { font-size: 13px; color: #767683; white-space: nowrap; }

  /* ── Form ───────────────────────────────────────────────── */
  .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
  .form-label { font-size: 14px; font-weight: 500; color: #454651; }
  .form-input {
    width: 100%; padding: 11px 14px;
    border: 1.5px solid #c6c5d3; border-radius: 10px;
    font-size: 15px; color: #1b1c1c;
    background: #fff; outline: none;
    transition: border-color 150ms, box-shadow 150ms;
  }
  .form-input::placeholder { color: #767683; }
  .form-input:focus {
    border-color: #136299;
    box-shadow: 0 0 0 3px rgba(19,98,153,0.1);
  }
  .form-input.error { border-color: #ba1a1a; }

  /* ── Password toggle ────────────────────────────────────── */
  .input-wrap { position: relative; }
  .input-wrap .form-input { padding-right: 44px; }
  .pw-toggle {
    position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
    background: none; border: none; cursor: pointer; padding: 4px;
    color: #767683; display: flex; align-items: center;
  }
  .pw-toggle:hover { color: #454651; }

  /* ── Forgot password ────────────────────────────────────── */
  .forgot-row {
    display: flex; justify-content: flex-end;
    margin-top: -8px; margin-bottom: 14px;
  }
  .forgot-link {
    font-size: 13px; color: #136299; font-weight: 500;
    text-decoration: none; cursor: pointer;
    background: none; border: none;
  }
  .forgot-link:hover { text-decoration: underline; }

  /* ── Submit button ──────────────────────────────────────── */
  .btn-submit {
    width: 100%; padding: 13px;
    border-radius: 10px; border: none;
    font-size: 16px; font-weight: 700;
    background: #132175; color: #fff;
    cursor: pointer;
    transition: background 150ms, transform 120ms, box-shadow 150ms;
    margin-top: 4px;
  }
  .btn-submit:hover {
    background: #2d3a8c;
    transform: translateY(-1px);
    box-shadow: 0 4px 14px rgba(19,33,117,0.22);
  }
  .btn-submit:active { transform: translateY(0); }
  .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none; }

  /* ── Bottom link ────────────────────────────────────────── */
  .bottom-text {
    text-align: center; font-size: 14px;
    color: #767683; margin-top: 20px;
  }
  .toggle-link {
    color: #136299; font-weight: 600;
    cursor: pointer; background: none; border: none;
    font-size: inherit; font-family: inherit;
    text-decoration: none;
  }
  .toggle-link:hover { text-decoration: underline; }

  /* ── Error message ──────────────────────────────────────── */
  .error-msg {
    background: #ffdad6; color: #ba1a1a;
    font-size: 13px; border-radius: 8px;
    padding: 10px 12px; margin-bottom: 14px;
    display: none;
  }
  .error-msg.visible { display: block; }

  /* ── Success state ──────────────────────────────────────── */
  .success-wrap {
    display: none;
    flex-direction: column; align-items: center;
    gap: 12px; text-align: center; padding: 24px 0;
  }
  .success-wrap.visible { display: flex; }
  .success-icon {
    width: 56px; height: 56px; border-radius: 50%;
    background: rgba(19,98,153,0.1);
    display: flex; align-items: center; justify-content: center;
  }
  .success-title { font-size: 20px; font-weight: 700; color: #132175; }
  .success-sub { font-size: 14px; color: #767683; line-height: 1.6; }

  /* ── Terms (signup only) ────────────────────────────────── */
  .terms-text {
    font-size: 12px; color: #767683; text-align: center;
    line-height: 1.6; margin-top: 14px;
  }
  .terms-text a { color: #136299; text-decoration: none; }
  .terms-text a:hover { text-decoration: underline; }

  /* ── Name field (signup only) ───────────────────────────── */
  .signup-only { display: none; }

  /* ── Loading spinner ────────────────────────────────────── */
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner {
    display: inline-block; width: 16px; height: 16px;
    border: 2.5px solid rgba(255,255,255,0.35);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle; margin-right: 6px;
  }

  /* ── Back to website ────────────────────────────────────── */
  .back-link {
    position: fixed; top: 20px; left: 24px;
    display: flex; align-items: center; gap: 6px;
    font-size: 13px; font-weight: 500; color: #767683;
    text-decoration: none; cursor: pointer;
    background: none; border: none;
    transition: color 150ms;
  }
  .back-link:hover { color: #132175; }
</style>
</head>
<body>

<button class="back-link" onclick="window.history.back()">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
  스밈 홈
</button>

<div class="card" id="main-card">

  <!-- Logo -->
  <div class="logo-wrap">
    <div class="logo-icon"><span>스</span></div>
    <div class="logo-name">스밈</div>
    <div class="logo-sub">Second Brain</div>
  </div>

  <!-- Page title -->
  <div class="page-title" id="page-title">로그인</div>

  <!-- Success state -->
  <div class="success-wrap" id="success-wrap">
    <div class="success-icon">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#136299" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <div class="success-title" id="success-title">로그인 성공!</div>
    <div class="success-sub" id="success-sub">대시보드로 이동 중입니다...</div>
  </div>

  <!-- Form area -->
  <div id="form-area">

    <!-- Social buttons -->
    <div class="social-list">
      <button class="btn-social btn-google" onclick="handleSocial('Google')">
        <svg width="18" height="18" viewBox="0 0 18 18">
          <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.25-.164-1.84H9v3.481h4.844a4.14 4.14 0 0 1-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/>
          <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/>
          <path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/>
          <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/>
        </svg>
        Google로 계속하기
      </button>

      <button class="btn-social btn-kakao" onclick="handleSocial('카카오')">
        <svg width="18" height="18" viewBox="0 0 18 18">
          <path fill="#191919" d="M9 1.5C4.858 1.5 1.5 4.134 1.5 7.378c0 2.07 1.376 3.888 3.448 4.923L4.1 14.73a.281.281 0 0 0 .432.296l3.43-2.291c.34.033.685.05 1.038.05 4.142 0 7.5-2.634 7.5-5.878S13.142 1.5 9 1.5z"/>
        </svg>
        카카오로 계속하기
      </button>

      <button class="btn-social btn-naver" onclick="handleSocial('네이버')">
        <svg width="18" height="18" viewBox="0 0 18 18">
          <path fill="white" d="M10.26 9.27 7.5 5H5v8h2.74L10.5 8.73V13H13V5h-2.74z"/>
        </svg>
        네이버로 계속하기
      </button>
    </div>

    <!-- Divider -->
    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-text">또는 이메일로</span>
      <div class="divider-line"></div>
    </div>

    <!-- Error message -->
    <div class="error-msg" id="error-msg"></div>

    <!-- Name (signup only) -->
    <div class="form-group signup-only" id="name-group">
      <label class="form-label">이름</label>
      <input class="form-input" type="text" id="name-input" placeholder="홍길동" autocomplete="name">
    </div>

    <!-- Email -->
    <div class="form-group">
      <label class="form-label">이메일</label>
      <input class="form-input" type="email" id="email-input" placeholder="you@example.com" autocomplete="email">
    </div>

    <!-- Password -->
    <div class="form-group">
      <label class="form-label">비밀번호</label>
      <div class="input-wrap">
        <input class="form-input" type="password" id="pw-input" placeholder="••••••••" autocomplete="current-password">
        <button class="pw-toggle" type="button" onclick="togglePw()" id="pw-toggle-btn" title="비밀번호 표시/숨기기">
          <svg id="pw-eye" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          <svg id="pw-eye-off" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
        </button>
      </div>
    </div>

    <!-- Confirm password (signup only) -->
    <div class="form-group signup-only" id="confirm-group">
      <label class="form-label">비밀번호 확인</label>
      <div class="input-wrap">
        <input class="form-input" type="password" id="confirm-input" placeholder="••••••••" autocomplete="new-password">
      </div>
    </div>

    <!-- Forgot password (login only) -->
    <div class="forgot-row" id="forgot-row">
      <button class="forgot-link" onclick="handleForgot()">비밀번호를 잊으셨나요?</button>
    </div>

    <!-- Submit -->
    <button class="btn-submit" id="submit-btn" onclick="handleSubmit()">로그인</button>

    <!-- Terms (signup only) -->
    <div class="terms-text signup-only" id="terms-text">
      가입 시 스밈의 <a href="#">이용약관</a> 및 <a href="#">개인정보처리방침</a>에<br>동의하는 것으로 간주됩니다.
    </div>

    <!-- Bottom toggle -->
    <div class="bottom-text" id="bottom-text">
      계정이 없으신가요? <button class="toggle-link" onclick="toggleMode()">회원가입</button>
    </div>
  </div>

</div>

<script>
  let isSignup = false;
  let pwVisible = false;

  function toggleMode() {
    isSignup = !isSignup;
    const signupEls = document.querySelectorAll('.signup-only');
    const title = document.getElementById('page-title');
    const submit = document.getElementById('submit-btn');
    const bottom = document.getElementById('bottom-text');
    const forgotRow = document.getElementById('forgot-row');
    const pwInput = document.getElementById('pw-input');
    const errorMsg = document.getElementById('error-msg');

    errorMsg.classList.remove('visible');

    if (isSignup) {
      title.textContent = '회원가입';
      submit.textContent = '계정 만들기';
      bottom.innerHTML = '이미 계정이 있으신가요? <button class="toggle-link" onclick="toggleMode()">로그인</button>';
      forgotRow.style.display = 'none';
      pwInput.setAttribute('autocomplete', 'new-password');
      signupEls.forEach(el => el.style.display = 'flex');
      document.getElementById('name-group').style.display = 'flex';
      document.getElementById('confirm-group').style.display = 'flex';
      document.getElementById('terms-text').style.display = 'block';
    } else {
      title.textContent = '로그인';
      submit.textContent = '로그인';
      bottom.innerHTML = '계정이 없으신가요? <button class="toggle-link" onclick="toggleMode()">회원가입</button>';
      forgotRow.style.display = 'flex';
      pwInput.setAttribute('autocomplete', 'current-password');
      signupEls.forEach(el => el.style.display = 'none');
    }

    // Clear inputs
    document.getElementById('email-input').value = '';
    document.getElementById('pw-input').value = '';
    if (document.getElementById('name-input')) document.getElementById('name-input').value = '';
    if (document.getElementById('confirm-input')) document.getElementById('confirm-input').value = '';
  }

  function togglePw() {
    pwVisible = !pwVisible;
    const input = document.getElementById('pw-input');
    const eye = document.getElementById('pw-eye');
    const eyeOff = document.getElementById('pw-eye-off');
    input.type = pwVisible ? 'text' : 'password';
    eye.style.display = pwVisible ? 'none' : 'block';
    eyeOff.style.display = pwVisible ? 'block' : 'none';
  }

  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg;
    el.classList.add('visible');
  }

  function handleSubmit() {
    const email = document.getElementById('email-input').value.trim();
    const pw = document.getElementById('pw-input').value;
    const errorEl = document.getElementById('error-msg');
    errorEl.classList.remove('visible');

    // Basic validation
    if (!email) { showError('이메일을 입력해주세요.'); return; }
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showError('올바른 이메일 형식이 아닙니다.'); return; }
    if (!pw) { showError('비밀번호를 입력해주세요.'); return; }
    if (pw.length < 6) { showError('비밀번호는 최소 6자 이상이어야 합니다.'); return; }

    if (isSignup) {
      const name = document.getElementById('name-input').value.trim();
      const confirm = document.getElementById('confirm-input').value;
      if (!name) { showError('이름을 입력해주세요.'); return; }
      if (pw !== confirm) { showError('비밀번호가 일치하지 않습니다.'); return; }
    }

    // Loading state
    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>' + (isSignup ? '처리 중...' : '로그인 중...');

    // Simulate request
    setTimeout(() => {
      btn.disabled = false;
      btn.textContent = isSignup ? '계정 만들기' : '로그인';

      document.getElementById('form-area').style.display = 'none';
      const sw = document.getElementById('success-wrap');
      sw.classList.add('visible');

      if (isSignup) {
        document.getElementById('success-title').textContent = '가입 완료!';
        document.getElementById('success-sub').textContent = '스밈에 오신 걸 환영해요.\n대시보드로 이동 중입니다...';
      } else {
        document.getElementById('success-title').textContent = '로그인 성공!';
        document.getElementById('success-sub').textContent = '대시보드로 이동 중입니다...';
      }
    }, 1200);
  }

  function handleSocial(provider) {
    const btn = event.currentTarget;
    const orig = btn.innerHTML;
    btn.disabled = true;
    btn.style.opacity = '0.65';
    btn.innerHTML = '<span class="spinner" style="border-top-color:currentColor;border-color:rgba(0,0,0,0.2);border-top-color:currentColor;"></span>' + provider + '로 이동 중...';
    setTimeout(() => {
      btn.disabled = false;
      btn.style.opacity = '1';
      btn.innerHTML = orig;
    }, 1400);
  }

  function handleForgot() {
    const email = document.getElementById('email-input').value.trim();
    if (!email) {
      showError('이메일을 먼저 입력하면 비밀번호 재설정 링크를 보내드려요.');
    } else {
      document.getElementById('error-msg').classList.remove('visible');
      document.getElementById('form-area').style.display = 'none';
      const sw = document.getElementById('success-wrap');
      sw.classList.add('visible');
      document.getElementById('success-title').textContent = '이메일을 확인하세요';
      document.getElementById('success-sub').textContent = email + ' 주소로\n비밀번호 재설정 링크를 보냈습니다.';
    }
  }

  // Enter key submit
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') handleSubmit();
  });
</script>
</body>
</html>
