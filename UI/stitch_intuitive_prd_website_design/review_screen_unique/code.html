<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Smim - Review Node</title>
<!-- Google Fonts: Geist & Material Symbols -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Theme Configuration -->
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "background": "#09090b",
                    "on-tertiary": "#001a12",
                    "tertiary-fixed": "#bbf7d0",
                    "on-tertiary-fixed-variant": "#047857",
                    "on-primary-container": "#ede9fe",
                    "error-container": "#3b1111",
                    "on-error": "#1a0000",
                    "surface-dim": "#0c0c0f",
                    "surface-container": "#121215",
                    "on-surface": "#fafafa",
                    "on-error-container": "#fca5a5",
                    "outline-variant": "#27272a",
                    "tertiary": "#34d399",
                    "surface-container-lowest": "#09090b",
                    "outline": "#52525b",
                    "surface-container-low": "#0f0f12",
                    "inverse-surface": "#fafafa",
                    "on-secondary-fixed": "#18181b",
                    "inverse-primary": "#5b21b6",
                    "surface-tint": "#a78bfa",
                    "on-primary-fixed": "#2e1065",
                    "primary-container": "#7c3aed",
                    "on-secondary-fixed-variant": "#3f3f46",
                    "on-primary-fixed-variant": "#5b21b6",
                    "secondary-fixed": "#a1a1aa",
                    "on-background": "#fafafa",
                    "error": "#ef4444",
                    "on-tertiary-fixed": "#003318",
                    "on-primary": "#0a0012",
                    "surface-bright": "#18181b",
                    "surface-container-highest": "#1e1e22",
                    "secondary-container": "#27272a",
                    "tertiary-fixed-dim": "#6ee7b7",
                    "primary-fixed": "#ede9fe",
                    "primary-fixed-dim": "#c4b5fd",
                    "on-tertiary-container": "#bbf7d0",
                    "surface": "#0c0c0f",
                    "secondary-fixed-dim": "#71717a",
                    "primary": "#a78bfa",
                    "secondary": "#71717a",
                    "on-secondary-container": "#a1a1aa",
                    "on-surface-variant": "#a1a1aa",
                    "inverse-on-surface": "#09090b",
                    "tertiary-container": "#065f46",
                    "surface-variant": "#18181b",
                    "surface-container-high": "#18181b",
                    "on-secondary": "#09090b"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Geist"],
                    "display": ["Geist"],
                    "body": ["Geist"],
                    "label": ["Geist"]
            }
          }
        }
      }
    </script>
<style>
        /* Essential base styles for Material Symbols */
        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined';
            font-weight: normal;
            font-style: normal;
            font-size: 24px;
            line-height: 1;
            letter-spacing: normal;
            text-transform: none;
            display: inline-block;
            white-space: nowrap;
            word-wrap: normal;
            direction: ltr;
            -webkit-font-feature-settings: 'liga';
            -webkit-font-smoothing: antialiased;
        }
        
        /* Custom Faint Grid Floor generation using Tailwind colors */
        .perspective-grid {
            background-image: 
                linear-gradient(rgba(39, 39, 42, 0.4) 1px, transparent 1px),
                linear-gradient(90deg, rgba(39, 39, 42, 0.4) 1px, transparent 1px);
            background-size: 60px 60px;
            background-position: center bottom;
            transform: perspective(600px) rotateX(70deg) translateY(50px) scale(2);
            transform-origin: bottom center;
            mask-image: linear-gradient(to top, black 20%, transparent 80%);
            -webkit-mask-image: linear-gradient(to top, black 20%, transparent 80%);
        }
    </style>
</head>
<body class="bg-background text-on-surface font-body antialiased h-screen w-screen overflow-hidden flex flex-col relative selection:bg-primary/30 selection:text-primary-fixed">
<!-- 
        NAVIGATION SUPPRESSION RATIONALE:
        Following the "Semantic Shell Mandate", this screen is highly Task-Focused ("Review Mode").
        It implies a temporary departure from the main flow to concentrate entirely on a single node.
        Therefore, TopNavBar and SideNavBar are suppressed to prioritize the immersive "Center Stage" canvas.
        A minimalist "Exit" action is provided instead.
    -->
<!-- Ambient Dark Background Elements -->
<div class="absolute inset-0 z-0 pointer-events-none overflow-hidden bg-[radial-gradient(ellipse_at_top_center,rgba(167,139,250,0.03),transparent_70%)]"></div>
<div class="absolute bottom-0 w-full h-[614px] z-0 pointer-events-none perspective-grid opacity-60"></div>
<!-- Minimalist Task Header -->
<header class="absolute top-0 w-full px-8 py-6 flex justify-between items-start z-30">
<div class="flex flex-col gap-1">
<div class="flex items-center gap-3">
<span class="relative flex h-2.5 w-2.5">
<span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-primary opacity-75"></span>
<span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-primary"></span>
</span>
<span class="font-headline text-xs font-bold tracking-[0.2em] text-primary uppercase">Deep Review</span>
</div>
<span class="text-on-surface-variant text-sm font-medium pl-5.5">Session Active</span>
</div>
<button class="flex items-center gap-2 text-on-surface-variant hover:text-on-surface transition-colors duration-200 group">
<span class="font-label text-sm font-medium group-hover:-translate-x-1 transition-transform">Exit Vault</span>
<span class="material-symbols-outlined text-[20px]" data-icon="logout">logout</span>
</button>
</header>
<!-- Center Stage Canvas -->
<main class="flex-1 flex flex-col items-center justify-center relative z-20 px-6 w-full max-w-4xl mx-auto mt-[-5vh]">
<!-- Memory Node Card -->
<article class="w-full bg-surface-container/80 backdrop-blur-xl border border-outline-variant rounded-xl shadow-[0_30px_60px_-20px_rgba(0,0,0,0.8),0_0_40px_-10px_rgba(167,139,250,0.05)] flex flex-col relative group transition-all duration-500 hover:border-outline">
<!-- Precise Corner Accents -->
<div class="absolute top-0 left-0 w-4 h-4 border-t-2 border-l-2 border-outline-variant rounded-tl-xl opacity-50"></div>
<div class="absolute top-0 right-0 w-4 h-4 border-t-2 border-r-2 border-outline-variant rounded-tr-xl opacity-50"></div>
<div class="absolute bottom-0 left-0 w-4 h-4 border-b-2 border-l-2 border-outline-variant rounded-bl-xl opacity-50"></div>
<div class="absolute bottom-0 right-0 w-4 h-4 border-b-2 border-r-2 border-outline-variant rounded-br-xl opacity-50"></div>
<!-- Card Header / Metadata -->
<div class="px-10 pt-10 pb-6 border-b border-outline-variant/50 flex justify-between items-center">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-on-surface-variant text-[20px]" data-icon="psychology">psychology</span>
<span class="font-label text-xs font-mono text-on-surface-variant tracking-wider">NODE_ID: 0x8F9A</span>
</div>
<div class="bg-surface-dim border border-outline-variant px-3 py-1 rounded text-xs font-medium text-secondary-fixed">
                    Neuroscience / AI
                </div>
</div>
<!-- The Question -->
<div class="px-10 py-16 flex-1 flex items-center justify-center min-h-[300px]">
<h1 class="font-headline text-3xl md:text-4xl lg:text-5xl font-semibold leading-tight tracking-tight text-center text-on-surface shadow-on-surface">
                    Explain the principle of "Hebbian Learning" in neural networks.
                </h1>
</div>
<!-- AI Assistance Holographic Overlay -->
<div class="bg-primary/5 border-t border-primary/10 px-10 py-5 flex gap-4 items-start relative overflow-hidden">
<!-- Holographic scanning line effect -->
<div class="absolute top-0 left-0 w-full h-[1px] bg-primary/20 shadow-[0_0_10px_rgba(167,139,250,0.5)] animate-[scan_3s_ease-in-out_infinite]"></div>
<span class="material-symbols-outlined text-primary mt-0.5" data-icon="auto_awesome" data-weight="fill" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
<div class="flex flex-col gap-1">
<span class="font-label text-xs font-bold text-primary tracking-widest uppercase">Smim Core Assist</span>
<p class="text-sm text-primary-fixed-dim leading-relaxed">
                        Recall the phrase often associated with this principle regarding how neurons interact when activated simultaneously.
                    </p>
</div>
</div>
</article>
</main>
<!-- High-Precision Response Interface -->
<footer class="absolute bottom-16 w-full flex justify-center z-30 px-6">
<div class="flex items-center gap-4 bg-surface-dim/80 backdrop-blur-md p-2 rounded-xl border border-outline-variant shadow-[0_10px_30px_-10px_rgba(0,0,0,0.5)]">
<!-- [FORGET] Action -->
<button class="flex items-center gap-3 px-6 py-3 bg-surface-container rounded-lg border border-outline-variant hover:border-error/50 hover:bg-surface-container-highest transition-all duration-200 group outline-none focus-visible:ring-2 focus-visible:ring-error focus-visible:ring-offset-2 focus-visible:ring-offset-background">
<!-- Neon Status Light: Square Red (Error) -->
<div class="w-2.5 h-2.5 bg-error rounded-[2px] shadow-[0_0_12px_rgba(239,68,68,0.8)] group-hover:shadow-[0_0_16px_rgba(239,68,68,1)] transition-shadow"></div>
<span class="font-label text-sm font-semibold tracking-wider text-on-surface-variant group-hover:text-on-surface transition-colors">FORGET</span>
</button>
<!-- Separator -->
<div class="w-[1px] h-6 bg-outline-variant"></div>
<!-- [VAGUE] Action -->
<button class="flex items-center gap-3 px-6 py-3 bg-surface-container rounded-lg border border-outline-variant hover:border-tertiary/50 hover:bg-surface-container-highest transition-all duration-200 group outline-none focus-visible:ring-2 focus-visible:ring-tertiary focus-visible:ring-offset-2 focus-visible:ring-offset-background">
<!-- Neon Status Light: Diamond Emerald (Tertiary - used for distinct mid-state as strict palette lacks yellow) -->
<div class="w-2.5 h-2.5 bg-tertiary rotate-45 shadow-[0_0_12px_rgba(52,211,153,0.8)] group-hover:shadow-[0_0_16px_rgba(52,211,153,1)] transition-shadow"></div>
<span class="font-label text-sm font-semibold tracking-wider text-on-surface-variant group-hover:text-on-surface transition-colors">VAGUE</span>
</button>
<!-- Separator -->
<div class="w-[1px] h-6 bg-outline-variant"></div>
<!-- [REMEMBER] Action -->
<button class="flex items-center gap-3 px-6 py-3 bg-surface-container rounded-lg border border-outline-variant hover:border-primary/50 hover:bg-surface-container-highest transition-all duration-200 group outline-none focus-visible:ring-2 focus-visible:ring-primary focus-visible:ring-offset-2 focus-visible:ring-offset-background">
<!-- Neon Status Light: Circle Violet (Primary) -->
<div class="w-2.5 h-2.5 bg-primary rounded-full shadow-[0_0_12px_rgba(167,139,250,0.8)] group-hover:shadow-[0_0_16px_rgba(167,139,250,1)] transition-shadow"></div>
<span class="font-label text-sm font-semibold tracking-wider text-on-surface-variant group-hover:text-on-surface transition-colors">REMEMBER</span>
</button>
</div>
</footer>
<style>
        @keyframes scan {
            0% { top: 0; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }
    </style>
</body></html>
